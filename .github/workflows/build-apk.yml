name: Build APK

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: 17
          distribution: temurin

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: 8.4

      - name: Generate Gradle Wrapper
        run: |
          mkdir -p temp_gradle
          cd temp_gradle
          echo "" > settings.gradle.kts
          gradle wrapper --gradle-version 8.4
          cd ..
          mkdir -p gradle/wrapper
          cp temp_gradle/gradlew .
          cp temp_gradle/gradlew.bat .
          cp temp_gradle/gradle/wrapper/gradle-wrapper.jar gradle/wrapper/
          cp temp_gradle/gradle/wrapper/gradle-wrapper.properties gradle/wrapper/
          chmod +x gradlew
          rm -rf temp_gradle

      - name: Download TFLite model
        run: |
          mkdir -p app/src/main/assets
          wget -O app/src/main/assets/Real-ESRGAN-x4plus.tflite "https://huggingface.co/qualcomm/Real-ESRGAN-x4plus/resolve/18bcccf15d8f0b6b20c8fb2d7cd4056b14fc9ebc/Real-ESRGAN-x4plus.tflite"

      - name: Build debug APK
        run: ./gradlew assembleDebug -Pandroid.useAndroidX=true

      - name: Upload APK
        uses: actions/upload-artifact@v4
        with:
          name: AI4KEnhancer-debug
          path: app/build/outputs/apk/debug/app-debug.apk
